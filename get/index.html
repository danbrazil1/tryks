<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Tryks</title>
  <meta name="description" content="Download Tryks — organize and learn boardsport tricks from your favorite videos.">
  <meta name="robots" content="noindex">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #06090B; color: #FFFFFF;
      min-height: 100vh; margin: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .brand { color: #C6F24E; font-size: 64px; font-weight: 900; letter-spacing: -2px; margin-bottom: 12px; }
    .sub { color: #A0B0BB; font-size: 17px; margin-bottom: 32px; max-width: 460px; line-height: 1.5; }
    .cta {
      display: inline-flex; align-items: center; gap: 10px;
      background: #C6F24E; border: 1px solid #C6F24E;
      color: #06090B; text-decoration: none;
      padding: 15px 28px; border-radius: 12px;
      font-size: 16px; font-weight: 700;
      transition: opacity 0.15s;
    }
    .cta:hover { opacity: 0.88; }
    .soon { color: #A0B0BB; font-size: 15px; }
    .links { margin-top: 28px; font-size: 13px; color: #7C8A95; }
    .links a { color: #7C8A95; text-decoration: underline; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="brand">TRYKS</div>
  <p class="sub">Organize and learn boardsport tricks from your favorite videos.</p>

  <!-- Store buttons (revealed by the script only for the matching device WHEN that
       store is live). Until then, everyone sees the "coming soon" block below. -->
  <a id="btn-android" class="cta hidden" href="#">Get it on Google Play</a>
  <a id="btn-ios" class="cta hidden" href="#">Download on the App Store</a>

  <div id="soon" class="soon">Coming soon to the App Store and Google Play.</div>

  <p class="links">
    <a href="/">tryks.app</a> &middot;
    <a href="/legal/">Privacy &amp; Terms</a>
  </p>

  <script>
    // ── Smart link ──────────────────────────────────────────────────────────
    // Compartilhado pelo app como https://tryks.app/get. Detecta o aparelho e,
    // quando a loja daquela plataforma estiver PÚBLICA, redireciona direto.
    // Enquanto não estiver, mostra "coming soon" + link da landing.
    //
    // >>> AO PUBLICAR: vire a flag da plataforma pra true (só aqui, sem mexer no app).
    var PLAY_LIVE = false;      // true quando o app estiver público na Google Play
    var APPSTORE_LIVE = false;  // true quando o app estiver público na App Store

    var PLAY_URL = 'https://play.google.com/store/apps/details?id=com.danbrazil.clips';
    var APPSTORE_URL = 'https://apps.apple.com/app/id6788589080';

    var ua = navigator.userAgent || '';
    var isAndroid = /android/i.test(ua);
    // iPadOS 13+ se identifica como "Macintosh" com toque — cobre iPhone/iPad/iPod.
    var isIOS = /iphone|ipad|ipod/i.test(ua) ||
                (/Macintosh/i.test(ua) && typeof document !== 'undefined' && 'ontouchend' in document);

    function reveal(id, url) {
      var el = document.getElementById(id);
      if (!el) return;
      el.href = url;
      el.classList.remove('hidden');
      document.getElementById('soon').classList.add('hidden');
    }

    if (isAndroid && PLAY_LIVE) {
      reveal('btn-android', PLAY_URL);
      window.location.replace(PLAY_URL);
    } else if (isIOS && APPSTORE_LIVE) {
      reveal('btn-ios', APPSTORE_URL);
      window.location.replace(APPSTORE_URL);
    }
    // Caso contrário: mantém a página (coming soon). Quando a loja da plataforma
    // do visitante estiver no ar, ele é redirecionado automaticamente acima.
  </script>
</body>
</html>
