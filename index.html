<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tryks</title>
  <meta name="description" content="Tryks — your personal library to organize and learn boardsport tricks from Instagram and YouTube videos.">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #06090B; color: #FFFFFF;
      min-height: 100vh; margin: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .brand { color: #C6F24E; font-size: 64px; font-weight: 900; letter-spacing: -2px; margin-bottom: 12px; }
    .sub { color: #A0B0BB; font-size: 17px; margin-bottom: 40px; max-width: 460px; line-height: 1.5; }
    .cta {
      display: inline-flex; align-items: center; gap: 10px;
      background: #0D1317; border: 1px solid #1E2D35;
      color: #FFFFFF; text-decoration: none;
      padding: 15px 24px; border-radius: 12px;
      font-size: 15px; font-weight: 600;
      transition: border-color 0.15s, background 0.15s;
    }
    .cta:hover { border-color: #C6F24E; background: #0F1B1F; }
    .links { margin-top: 28px; font-size: 13px; color: #7C8A95; }
    .links a { color: #7C8A95; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="brand">TRYKS</div>
  <p class="sub">Your personal library to organize and learn boardsport tricks from Instagram and YouTube videos.</p>
  <a class="cta" href="./legal/">Privacy Policy &amp; Terms of Use</a>
  <p class="links">
    <a href="mailto:info@tryks.app">info@tryks.app</a> &middot;
    <a href="mailto:privacy@tryks.app">privacy@tryks.app</a>
  </p>
</body>
</html>
